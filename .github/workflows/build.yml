name: Build

on:
  push:
    branches: [main, external/main]
  pull_request:
    branches: [main, external/main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Console multi-targets net10.0-macos*; solution restore/build on Windows needs the macOS workload packs.
      - name: Install macOS workload (host TFM; pin matches Directory.Build.props)
        run: dotnet workload install macos

      - name: Restore
        run: dotnet restore ./AudioAnalyzer.sln

      - name: Build (warnings as errors)
        run: dotnet build ./AudioAnalyzer.sln --no-incremental -warnaserror
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # Primary Windows host target; full solution restore also resolves the pinned macOS host TFM (ADR-0086).
      - name: Test
        run: >-
          dotnet test ./AudioAnalyzer.sln --no-build -warnaserror -f net10.0-windows10.0.19041.0
          --logger "trx;LogFileName=tests.trx"
          --logger "junit;LogFilePath=TestResults/junit.xml"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/TestResults/tests.trx
            **/TestResults/junit.xml
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install macOS workload (pinned net10.0-macos* host; see Directory.Build.props)
        run: dotnet workload install macos

      - name: Restore (solution — resolves Windows targeting packs)
        run: dotnet restore ./AudioAnalyzer.sln

      # Repo-wide style gate for the Unix agent graph (PBI-012); matches AGENTS.md dotnet format policy.
      - name: Verify formatting
        run: dotnet format ./AudioAnalyzer.sln --verify-no-changes

      # Pinned macOS host TFM (ADR-0086); keep in sync with Directory.Build.props → AudioAnalyzerMacOsHostTfm.
      - name: Build Console (macOS host TFM)
        run: dotnet build ./src/AudioAnalyzer.Console/AudioAnalyzer.Console.csproj --no-incremental -warnaserror -f net10.0-macos26.0
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      - name: Build tests (macOS host TFM)
        run: dotnet build ./tests/AudioAnalyzer.Tests/AudioAnalyzer.Tests.csproj --no-incremental -warnaserror -f net10.0-macos26.0
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1

      # Integration suite may assume Windows console/audio; unit-only gate matches AGENTS.md allowance for macOS agents.
      - name: Test (unit, macOS host TFM)
        run: >-
          dotnet test ./tests/AudioAnalyzer.Tests/AudioAnalyzer.Tests.csproj --no-build -warnaserror -f net10.0-macos26.0
          --filter "FullyQualifiedName!~AudioAnalyzer.Tests.Integration"
          --logger "trx;LogFileName=tests-macos.trx"
          --logger "junit;LogFilePath=TestResults/junit-macos.xml"

      - name: Upload macOS test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-macos
          path: |
            **/TestResults/tests-macos.trx
            **/TestResults/junit-macos.xml
          if-no-files-found: warn

  # EnricoMi/publish-unit-test-result-action is a container action (Linux-only).
  # Consumes Windows artifact only; macOS TRX/JUnit stay in test-reports-macos for manual triage until we add a merge step.
  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: read
      checks: write
    steps:
      - name: Download test reports
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: test-reports

      - name: Publish test results
        if: steps.download.outcome == 'success'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: |
            test-reports/**/TestResults/tests.trx
            test-reports/**/TestResults/junit.xml
          check_name: Test results
          comment_mode: off
